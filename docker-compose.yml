services:
  postgres:
    image: postgres:16-alpine
    container_name: jnlop-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jnlop
      POSTGRES_PASSWORD: jnlop_dev
      POSTGRES_DB: jnlop
    volumes:
      - jnlop_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jnlop -d jnlop"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jnlop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - jnlop_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jnlop_pg_data:
  jnlop_redis_data:
