services:
  - type: web
    name: jnlop-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: bash scripts/render-build.sh
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        sync: false
      - key: WEB_APP_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_SUPPORT
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: jnlop-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: jnlop-db
    plan: free
    region: frankfurt
